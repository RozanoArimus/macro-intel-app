<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Intel | Premium Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border: 1px solid #F3F4F6; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">
    
    <header class="p-6 flex justify-between items-center bg-white border-b border-gray-100">
        <div class="text-xs text-gray-500 uppercase tracking-widest">23 Apr 2026</div>
        <div class="font-serif text-xl font-semibold tracking-tight text-gray-900">XAU/USD</div>
        <div>
            <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-center space-y-8">
        
        <div class="text-center">
            <div class="text-sm text-gray-500 mb-2 uppercase tracking-widest">Live Gold Price</div>
            <h1 class="text-5xl font-light tracking-tighter text-gray-900 mb-4">$2,345.50</h1>
            <div class="inline-block px-4 py-1 rounded-full bg-green-50 border border-green-100 text-green-700 text-sm font-medium">
                Sentimen AI: 78% Bullish
            </div>
        </div>

        <div class="glass-card w-full max-w-md p-6">
            <h2 class="font-serif text-lg font-semibold mb-3 text-gray-900">Macro Driver Today</h2>
            <p class="text-gray-600 leading-relaxed text-sm text-justify">
                Kenaikan tak terduga pada data inflasi makro menahan laju penguatan Gold di area resisten teknikal. Sistem memproyeksikan konsolidasi menengah, menunggu rilis data tambahan pasar.
            </p>
        </div>

        <button class="w-full max-w-md bg-gray-900 text-white py-4 rounded-lg font-medium tracking-wide hover:bg-gray-800 transition-colors shadow-lg shadow-gray-200">
            Lihat Kilas Balik Historis
        </button>
        
    </main>
</body>
</html>
